# ---------------------------------------------------------------------------
# Kind cluster configuration for the Yuno zero-downtime deployment exercise
# Multi-node: 1 control-plane + 3 workers
# ---------------------------------------------------------------------------
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: yuno
nodes:
  # -- Control-plane with extra port mappings for Istio Gateway ---------------
  - role: control-plane
    labels:
      topology.kubernetes.io/zone: zone-a
      node-role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP

  # -- Worker nodes with labels for anti-affinity testing ---------------------
  - role: worker
    labels:
      topology.kubernetes.io/zone: zone-a
      node-role: worker
      worker-id: "1"

  - role: worker
    labels:
      topology.kubernetes.io/zone: zone-b
      node-role: worker
      worker-id: "2"

  - role: worker
    labels:
      topology.kubernetes.io/zone: zone-c
      node-role: worker
      worker-id: "3"
