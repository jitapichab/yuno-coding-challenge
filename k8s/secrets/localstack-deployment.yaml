apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
  namespace: secrets
  labels:
    app: localstack
    app.kubernetes.io/part-of: transaction-engine
    app.kubernetes.io/component: secrets-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localstack
  template:
    metadata:
      labels:
        app: localstack
    spec:
      containers:
        - name: localstack
          image: localstack/localstack:3.4
          ports:
            - containerPort: 4566
              name: edge
          env:
            - name: SERVICES
              value: "secretsmanager"
            - name: DEFAULT_REGION
              value: "us-east-1"
            - name: DEBUG
              value: "0"
            - name: EAGER_SERVICE_LOADING
              value: "1"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /_localstack/health
              port: 4566
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /_localstack/health
              port: 4566
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: localstack
  namespace: secrets
  labels:
    app: localstack
    app.kubernetes.io/part-of: transaction-engine
    app.kubernetes.io/component: secrets-backend
spec:
  selector:
    app: localstack
  ports:
    - protocol: TCP
      port: 4566
      targetPort: 4566
      name: edge
  type: ClusterIP
